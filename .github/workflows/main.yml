name: Podcast Auto Analyst

on:
  schedule:
    - cron: '0,15,30,45 0,1,2,3,4 * * 3'
    - cron: '0 5-23 * * 3'
    - cron: '0 4-23 * * 6'

  workflow_dispatch:
    inputs:
      force_rerun:
        description: '強制重新分析（忽略已處理快取）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ 直接升級到 Node.js 24，消除警告

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 檢出程式碼
        uses: actions/checkout@v4.2.2        # ✅ 升級到支援 Node 24 的版本

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v5.6.0    # ✅ 升級到支援 Node 24 的版本
        with:
          python-version: '3.11'

      - name: 3. 安裝依賴套件
        run: pip install -r requirements.txt

      - name: 4. 執行分析主程式
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:     ${{ secrets.GMAIL_PASS }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          FORCE_RERUN:    ${{ github.event.inputs.force_rerun || 'false' }}
        run: python main.py

      - name: 5. 存回已處理紀錄與分析結果
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update: processed episode"
          file_pattern: 'last_ep.txt output/*.txt output/*.json'
